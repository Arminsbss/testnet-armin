name: Direct Download (Python)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Download URL'
        required: true
      folder:
        description: 'Output folder'
        required: false
        default: 'downloads'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Python downloader
        run: |
          python3 << PYEOF
          import os, subprocess, shutil
          
          url = "${{ github.event.inputs.url }}"
          out_folder = "${{ github.event.inputs.folder }}"
          
          os.makedirs("temp", exist_ok=True)
          os.chdir("temp")
          
          filename = url.split('/')[-1].split('?')[0]
          subprocess.run(["wget", url, "-O", filename], check=True)
          
          size = os.path.getsize(filename)
          max_size = 95 * 1024 * 1024
          
          if size > max_size:
              print(f"Splitting {filename} ({size/1024/1024:.1f}MB)")
              with open(filename, 'rb') as f:
                  part = 0
                  while True:
                      chunk = f.read(max_size)
                      if not chunk:
                          break
                      with open(f"{filename}.part_{part:02d}", 'wb') as pf:
                          pf.write(chunk)
                      part += 1
              
              subprocess.run(["md5sum", filename], stdout=open(f"{filename}.md5", 'w'))
              os.remove(filename)
              
              with open("reassemble.sh", "w") as sf:
                  sf.write("#!/bin/bash\n")
                  sf.write(f"cat {filename}.part_* > {filename}\n")
                  sf.write(f"md5sum -c {filename}.md5\n")
              os.chmod("reassemble.sh", 0o755)
              print(f"Split into {part} parts")
          
          os.chdir("..")
          os.makedirs(out_folder, exist_ok=True)
          for f in os.listdir("temp"):
              shutil.move(f"temp/{f}", f"{out_folder}/")
          os.rmdir("temp")
          PYEOF
        shell: bash
      
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.folder }}/"
          git diff --staged --quiet || git commit -m "Download [skip ci]"
          git push
        shell: bash