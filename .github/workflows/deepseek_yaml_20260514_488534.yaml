name: Direct Download from URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string
      output_folder:
        description: 'پوشه خروجی'
        required: false
        type: string
        default: 'downloads'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Download and process file
      run: |
        mkdir -p temp_dl
        cd temp_dl
        
        URL="${{ github.event.inputs.url }}"
        FILENAME=$(basename "$URL" | cut -d '?' -f1)
        
        echo "Downloading: $URL"
        wget --progress=bar:force "$URL" -O "$FILENAME" 2>&1
        
        FILE_SIZE=$(stat -c%s "$FILENAME")
        FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
        echo "File size: ${FILE_SIZE_MB} MB"
        
        MAX_SIZE=$((95 * 1024 * 1024))
        
        if [ $FILE_SIZE -gt $MAX_SIZE ]; then
          echo "File larger than 95MB, splitting..."
          split -b 95M -d "$FILENAME" "${FILENAME}.part_"
          md5sum "$FILENAME" > "${FILENAME}.md5"
          rm "$FILENAME"
          
          PART_COUNT=$(ls ${FILENAME}.part_* 2>/dev/null | wc -l)
          echo "✓ Split into ${PART_COUNT} parts"
        fi
        
        cd ..
        
      shell: bash
    
    - name: Create reassemble script with Python
      run: |
        cd temp_dl
        
        python3 << 'PYTHON_SCRIPT'
        import os
        import glob
        
        # Find the main file (without .part_)
        part_files = glob.glob("*.part_*")
        if part_files:
            # Get base filename
            base_name = part_files[0].replace(".part_00", "").replace(".part_01", "")
            base_name = base_name.split(".part_")[0]
            
            # Create reassemble script
            with open(f"reassemble_{base_name}.sh", "w") as f:
                f.write("#!/bin/bash\n")
                f.write(f"# Reassemble script for {base_name}\n")
                f.write(f"cat {base_name}.part_* > {base_name}\n")
                if os.path.exists(f"{base_name}.md5"):
                    f.write(f"md5sum -c {base_name}.md5\n")
                f.write('echo "Done! File: {base_name}"\n')
            
            os.chmod(f"reassemble_{base_name}.sh", 0o755)
            print(f"✓ Created reassemble_{base_name}.sh")
        else:
            print("No split files found, skipping reassemble script")
        PYTHON_SCRIPT
        
        cd ..
        
      shell: bash
    
    - name: Move and push to repository
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        mkdir -p "${{ github.event.inputs.output_folder }}"
        
        # Move all files except the original large file
        cd temp_dl
        for file in *; do
          if [ -f "$file" ]; then
            # Skip if it's the original large file (should already be deleted)
            mv "$file" "../${{ github.event.inputs.output_folder }}/"
            echo "Moved: $file"
          fi
        done
        cd ..
        
        git add "${{ github.event.inputs.output_folder }}/"
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Direct Download: ${{ github.event.inputs.url }} [skip ci]"
          git push
          echo "✓ Successfully pushed"
        fi
        
        echo ""
        echo "=== Files in repository ==="
        ls -lh "${{ github.event.inputs.output_folder }}/"
        
      shell: bash